name: CarteNabil-Android-Build-APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Android Native Folders
        run: flutter create --org com.supportclub.carte --project-name carte_nabil . --platforms=android --no-overwrite

      - name: Fix Kotlin & R8 Versions
        run: |
          # Inject R8 dependency at the start of the root build.gradle safely
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath \"com.android.tools:r8:8.3.37\" } }" > r8_fix.gradle
          cat r8_fix.gradle android/build.gradle > android/build.gradle.new && mv android/build.gradle.new android/build.gradle
          # Force Kotlin 1.9.24 ONLY for the kotlin plugin in settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle || true
          # Force Kotlin 1.9.24 in build.gradle if present
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle || true

      - name: Add Android Permissions
        run: |
          # Update package name
          sed -i 's/package=".*"/package="com.supportclub.carte"/' android/app/src/main/AndroidManifest.xml
          # Inject permissions for internet, camera, microphone, and storage
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>\n    <uses-permission android:name="android.permission.CAMERA" \/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" \/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" \/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" \/>' android/app/src/main/AndroidManifest.xml
          # Allow cleartext traffic and set app label
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label=".*"/android:label="ASSIMA-10"/' android/app/src/main/AndroidManifest.xml
          # Verification
          cat android/app/src/main/AndroidManifest.xml

      - name: Fix Min SDK Version
        run: |
          sed -i 's/flutter.minSdkVersion/23/g' android/app/build.gradle
          sed -i 's/minSdkVersion 21/minSdkVersion 23/g' android/app/build.gradle

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CarteNabil-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
