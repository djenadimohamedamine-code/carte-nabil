name: CarteNabil-iOS-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Prep Project & Build
        run: |
          flutter config --no-analytics
          flutter pub get
          # Definitive Podfile Generation (Fix Propre: String flags)
          mkdir -p ios
          ruby -e 'File.write("ios/Podfile", <<~"PODFILE"
            platform :ios, "13.0"
            ENV["COCOAPODS_DISABLE_STATS"] = "true"
            project "Runner", {
              "Debug" => :debug,
              "Profile" => :release,
              "Release" => :release,
            }
            def flutter_root
              generated_xcode_build_settings_path = File.expand_path(File.join("..", "Flutter", "Generated.xcconfig"), __FILE__)
              File.foreach(generated_xcode_build_settings_path) do |line|
                matches = line.match(/FLUTTER_ROOT=(.*)/)
                return matches[1].strip if matches
              end
              raise "FLUTTER_ROOT not found"
            end
            require File.expand_path(File.join(flutter_root, "packages", "flutter_tools", "bin", "podhelper"))
            flutter_ios_podfile_setup
            target "Runner" do
              use_frameworks!
              use_modular_headers!
              flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            end
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                flutter_additional_ios_build_settings(target)
                target.build_configurations.each do |config|
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0"
                  # ✅ FIX PROPRE: Utilisation de Strings uniquement (évite la corruption des flags)
                  config.build_settings["OTHER_CFLAGS"] = "$(inherited)"
                  config.build_settings["OTHER_CPLUSPLUSFLAGS"] = "$(inherited)"
                  config.build_settings["OTHER_LDFLAGS"] = "$(inherited)"
                end
              end
            end
          PODFILE
          )'
          cd ios && pod install && cd ..
          # Debug: Vérification de l'injection du flag -G
          echo "🔍 Vérification des flags -G..."
          grep -R "\-G" ios --include="*.xcconfig" --include="*.pbxproj" || echo "✅ Aucun flag -G détecté"

      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-App-iOS
          path: build/ios/iphoneos/Runner.app
