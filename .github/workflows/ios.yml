name: CarteNabil-iOS-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Regenerate Platforms
        run: |
          flutter clean
          flutter create --project-name=carte_nabil --platforms=ios,web,android .
          flutter pub get
          # Ensure camera permissions are added to Info.plist
          mkdir -p ios/Runner
          if [ -f ios/Runner/Info.plist ]; then
            ruby -i -pe 'gsub(/<dict>/, "<dict>\n<key>NSCameraUsageDescription</key>\n<string>Scan de cartes de membres</string>\n<key>NSMicrophoneUsageDescription</key>\n<string>Utilisation du micro pour le scanner</string>")' ios/Runner/Info.plist
          fi
          # Force iOS 13.0 and Clean Flags by overwriting Podfile entirely (UNCONDITIONAL)
          mkdir -p ios
          ruby -e 'File.write("ios/Podfile", <<~PODFILE
            platform :ios, "13.0"
            ENV["COCOAPODS_DISABLE_STATS"] = "true"
            project "Runner", {
              "Debug" => :debug,
              "Profile" => :release,
              "Release" => :release,
            }

            require File.expand_path(File.join("packages", "flutter_tools", "bin", "podhelper"), Dir.pwd)

            flutter_ios_podfile_setup

            target "Runner" do
              use_frameworks!
              use_modular_headers!

              flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            end

            post_install do |installer|
              installer.pods_project.targets.each do |target|
                flutter_additional_ios_build_settings(target)
                target.build_configurations.each do |config|
                  config.build_settings["OTHER_CFLAGS"] = ["$(inherited)"]
                  config.build_settings["OTHER_CPLUSPLUSFLAGS"] = ["$(inherited)"]
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0"
                end
              end
            end
          PODFILE
          )'

      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-App-iOS
          path: build/ios/iphoneos/Runner.app
