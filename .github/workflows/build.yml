name: Flutter CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          
      - name: Generate Flutter template if missing
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder is missing, running flutter create..."
            flutter config --no-analytics
            flutter create --project-name carte_nabil --org com.supportclub.carte .
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add .
            git commit -m "Auto-generated Flutter basic template"
            git push
          fi
          
      - name: Get dependencies
        if: hashFiles('pubspec.yaml') != ''
        run: flutter pub get
        
      - name: Build APK Release
        if: hashFiles('pubspec.yaml') != ''
        run: flutter build apk --release

      - name: Upload APK
        if: hashFiles('build/app/outputs/flutter-apk/app-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
